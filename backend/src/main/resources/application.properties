# Veil Protocol backend configuration.
#
# Confidential layer is chosen by Spring profile (see AppConfig):
#   default / no profile -> MockConfidentialGateway (in-process, no Midnight node)
#   profile "midnight"   -> MidnightConfidentialGateway -> relayer sidecar
#
# Enable the real referee:
#   mvn -f backend/pom.xml spring-boot:run -Dspring-boot.run.profiles=midnight
# and run the relayer:
#   npm --workspace @veil/midnight run relayer

spring.application.name=veil-backend

# URL of the Midnight relayer sidecar (used only under the "midnight" profile).
veil.midnight.relayer-url=http://localhost:6301
